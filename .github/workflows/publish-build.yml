name: Build and Publish to JFrog

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: jfrog-task-app
  BUILD_NAME: jfrog-task

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Configure npm with Artifactory
        run: jf npm-config --repo-resolve ${{ vars.NPM_VIRTUAL_REPO }}

      - name: Install dependencies (via Artifactory)
        run: jf npm install --build-name=${{ env.BUILD_NAME }} --build-number=${{ github.run_number }}


      - name: Xray Security Audit
        run: jf audit --npm --fail=false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login to Artifactory
        run: |
          echo "${{ secrets.JF_ACCESS_TOKEN }}" | \
          docker login beneliyahu.jfrog.io -u beneliyahu --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} \
            -t ${{ secrets.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image via JFrog CLI
        run: |
          jf docker push \
            ${{ secrets.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ github.run_number }}

      - name: Collect environment info
        run: jf rt bce ${{ env.BUILD_NAME }} ${{ github.run_number }}

      - name: Publish Build Info to Artifactory
        run: jf rt bp ${{ env.BUILD_NAME }} ${{ github.run_number }}
